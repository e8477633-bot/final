<!DOCTYPE html>
<html>
<head>
    <title>Lecturer Dashboard - Mzuzu University</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
        body{background:#f0f4f8}
        .navbar{background:#0a2b3e;color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .logo{font-size:1.3rem;font-weight:bold}
        .badge{background:#fdbb4d;color:#0a2b3e;padding:5px 12px;border-radius:20px}
        .logout-btn{background:#dc2626;color:white;border:none;padding:8px 20px;border-radius:10px;cursor:pointer}
        .container{max-width:1000px;margin:20px auto;padding:0 20px}
        .create-post{background:white;border-radius:20px;padding:20px;margin-bottom:20px}
        .create-post input,.create-post textarea{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ddd}
        .create-post textarea{min-height:100px}
        .submit-post{background:#0a2b3e;color:white;padding:10px 20px;border:none;border-radius:10px;cursor:pointer}
        .post-card{background:white;border-radius:20px;padding:20px;margin-bottom:20px}
        .post-title{font-size:1.2rem;font-weight:bold;color:#1a4a6f}
        .post-date{font-size:11px;color:#666;margin:5px 0}
        .delete-post{background:#dc2626;color:white;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;margin-top:10px}
        .contact{background:#f5f5f5;padding:15px;border-radius:10px;margin-top:20px;font-size:12px;text-align:center}
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🎓 Mzuzu University <span style="color:#fdbb4d">Lecturer Portal</span></div>
        <div><span class="badge" id="programBadge">BED_ICT</span> <span class="badge">Year <span id="levelBadge">1</span></span></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="container">
        <div class="create-post">
            <h3>📝 Create Announcement</h3>
            <input type="text" id="postTitle" placeholder="Title">
            <textarea id="postContent" placeholder="Write your announcement..."></textarea>
            <button class="submit-post" onclick="createPost()">📢 Post Announcement</button>
        </div>
        <h3>📢 All Announcements</h3>
        <div id="postsList"></div>
        <div class="contact">
            <strong>📞 For Queries:</strong> Emmanuel Chimombo 0891011842 | e8477633@gmail.com<br>
            ⚠️ Queries beyond mechanical errors must be directed to your Head of Department
        </div>
    </div>
    <script>
        let currentUser = JSON.parse(localStorage.getItem('user'));
        if(!currentUser || currentUser.role !== 'lecturer') window.location.href = 'index.html';
        document.getElementById('programBadge').innerHTML = currentUser.program;
        document.getElementById('levelBadge').innerHTML = currentUser.level;
        
        async function loadPosts() {
            try {
                let res = await fetch('/api/posts');
                let posts = await res.json();
                let filtered = posts.filter(p => p.program === currentUser.program && p.level == currentUser.level);
                let html = '';
                for(let i = filtered.length-1; i >= 0; i--) {
                    let p = filtered[i];
                    html += `<div class="post-card">
                        <div class="post-title">${escapeHtml(p.title)}</div>
                        <div class="post-date">📅 ${p.date} by ${p.lecturer}</div>
                        <div>${escapeHtml(p.content)}</div>
                        <button class="delete-post" onclick="deletePost(${p.id})">🗑️ Delete</button>
                    </div>`;
                }
                document.getElementById('postsList').innerHTML = html || '<p>No announcements yet.</p>';
            } catch(e) { console.error(e); }
        }
        
        async function createPost() {
            let title = document.getElementById('postTitle').value;
            let content = document.getElementById('postContent').value;
            if(!title || !content) { alert('Please enter title and content'); return; }
            let post = {
                program: currentUser.program,
                level: currentUser.level,
                title: title,
                content: content,
                lecturer: currentUser.name
            };
            let res = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(post)
            });
            if(res.ok) {
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                loadPosts();
                alert('Announcement posted!');
            }
        }
        
        async function deletePost(id) {
            await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            loadPosts();
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                return m == '&' ? '&amp;' : (m == '<' ? '&lt;' : '&gt;');
            });
        }
        
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        loadPosts();
        setInterval(loadPosts, 5000);
    </script>
</body>
</html>

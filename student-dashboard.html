<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mzuzu University - Student Portal</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',Roboto,sans-serif}
        body{background:#f0f4f8;padding-bottom:40px}
        .navbar{background:#0a2b3e;color:white;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
        .logo{font-size:1.3rem;font-weight:bold}
        .logo span{color:#fdbb4d}
        .user-info{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
        .badge{background:#fdbb4d;color:#0a2b3e;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:bold}
        .logout-btn{background:#dc2626;border:none;padding:8px 20px;border-radius:40px;color:white;cursor:pointer}
        .container{max-width:1000px;margin:24px auto;padding:0 20px}
        .welcome-card{background:linear-gradient(135deg,#1a4a6f,#2c7da0);color:white;padding:30px;border-radius:24px;margin-bottom:30px}
        .readonly-badge{background:#10b981;color:white;padding:4px 12px;border-radius:20px;font-size:12px;display:inline-block;margin-top:10px}
        .posts-container{background:white;border-radius:24px;padding:24px}
        .posts-container h3{color:#0a2b3e;margin-bottom:20px}
        .post-card{border:1px solid #e2e8f0;border-radius:20px;padding:20px;margin-bottom:20px;background:#fafcff}
        .post-header{display:flex;gap:12px;align-items:center;margin-bottom:12px}
        .post-lecturer-name{font-weight:bold;color:#0a2b3e}
        .post-date{font-size:11px;color:#94a3b8}
        .post-title{font-size:1.2rem;font-weight:bold;color:#1a4a6f;margin:12px 0 8px}
        .post-content{color:#334155;line-height:1.5;margin-bottom:12px}
        .post-media{margin:12px 0}
        .empty-state{text-align:center;padding:40px;color:#94a3b8}
        @media (max-width:600px){.navbar{flex-direction:column;text-align:center}}
    </style>
</head>
<body>
    <div class="navbar"><div class="logo">🎓 Mzuzu University <span>Student Portal</span></div><div class="user-info"><span class="badge" id="programBadge">Loading...</span><span class="badge">Year <span id="levelBadge">-</span></span><button class="logout-btn" onclick="logout()">Logout</button></div></div>
    <div class="container"><div class="welcome-card"><h2>👋 Welcome, <span id="studentName">Student</span></h2><p>You are in <strong>Read-Only Mode</strong>. View announcements from your lecturers below.</p><span class="readonly-badge">🔒 Read Only</span></div>
    <div class="posts-container"><h3>📢 Announcements from Lecturers</h3><div id="postsList"><div class="empty-state">Loading announcements...</div></div></div></div>
    <script>
        var currentUser=null;
        try{currentUser=JSON.parse(localStorage.getItem('currentUser'));if(!currentUser||currentUser.role!=='student')window.location.href='login.html';}catch(e){window.location.href='login.html';}
        document.getElementById('programBadge').innerHTML=currentUser.programCode;document.getElementById('levelBadge').innerHTML=currentUser.level;document.getElementById('studentName').innerHTML=currentUser.fullname||'Student';
        async function loadPosts(){try{var res=await fetch('/api/posts/'+currentUser.programCode+'/'+currentUser.level);var posts=await res.json();var container=document.getElementById('postsList');if(!posts.length){container.innerHTML='<div class="empty-state">📭 No announcements yet.</div>';return;}var html='';for(var i=0;i<posts.length;i++){var post=posts[i];html+='<div class="post-card"><div class="post-header"><div><div class="post-lecturer-name">'+escapeHtml(post.lecturer_name)+'</div><div class="post-date">📅 '+new Date(post.created_at).toLocaleString()+'</div></div></div><div class="post-title">'+escapeHtml(post.title)+'</div><div class="post-content">'+escapeHtml(post.content)+'</div>';if(post.media_url){html+='<div class="post-media">';if(post.media_type==='voice')html+='<audio controls src="'+post.media_url+'"></audio>';if(post.media_type==='video')html+='<video controls src="'+post.media_url+'" width="100%"></video>';if(post.media_type==='document')html+='<a href="'+post.media_url+'" target="_blank">📄 Download Document</a>';if(post.media_type==='image')html+='<img src="'+post.media_url+'" style="max-width:100%;border-radius:12px">';html+='</div>';}html+='</div>';}container.innerHTML=html;}catch(e){document.getElementById('postsList').innerHTML='<div class="empty-state">⚠️ Error loading posts</div>';}}
        function escapeHtml(str){if(!str)return '';return str.replace(/[&<>]/g,function(m){return m=='&'?'&amp;':m=='<'?'&lt;':'&gt;';});}
        function logout(){localStorage.removeItem('currentUser');window.location.href='login.html';}
        loadPosts();setInterval(loadPosts,30000);
    </script>
</body>
</html>
